name: Backend CI

on:
  pull_request:
    branches:
      - main
  
  push:
    branches:
      - main
    paths:
      - 'alembic.ini'
      - 'migrations/**'
      - 'requirements.txt'
      - '**.py'

env:
  PYTHON_VERSION: '3.11'

jobs:
  quality:
    name: Code Quality Checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
          cache-dependency-path: 'requirements.txt'

      - name: Install Linting Tool
        run: |
          pip install flake8 black isort bandit

      - name: Check formatting (Black)
        run: black --check --diff app/ || echo "Run 'black app/' locally to fix"
        continue-on-error: true
      
      - name: check imports
        run: isort --check-only app/
        continue-on-error: true

      - name: Lint with flake8
        run: |
          flake8 app/ --count --select=E9,F63,F7,F82 --show-source --statistics
          flake8 app/ --count --exit-zero --max-complexity=10 --max-line-length=88 --statistics

      - name: Security scan (Bandit)
        run: |
          bandit -r app/ -f json -o bandit-report.json || true

      - name: Upload security report
        uses: actions/upload-artifact@v4
        with:
          name: security-report
          path: bandit-report.json
          retention-days: 7


  test:
    name: Run Test
    runs-on: ubuntu-latest
    needs: quality

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: testdb
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install pytest pytest-cov alembic
          pip install -r requirements.txt

      - name: Setup DB
        env:
          DATABASE_HOST: localhost
          DATABASE_PORT: 5432
          DATABASE_NAME: testdb
          DATABASE_USER: test
          DATABASE_PASSWORD: test
          SECRET_KEY: uyuyyei%GYWGuehbk-#!jhdbiGGG
        run: |
          alembic upgrade head

      - name: Run Pytest
        env:
          DATABASE_HOST: localhost
          DATABASE_PORT: 5432
          DATABASE_NAME: testdb
          DATABASE_USER: test
          DATABASE_PASSWORD: test
          SECRET_KEY: uyuyyei%GYWGuehbk-#!jhdbiGGG
          FLASK_ENV: testing
        run: |
          pytest \
            --cov=app \
            --cov-report=xml \
            --cov-report=html \
            --cov-report=term \
            -v

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: |
            htmlcov/
            coverage.xml
          retention-days: 7


  build:
    name: Build Deployment Artifact
    runs-on: ubuntu-latest
    needs: [quality, test]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create the Artifact
        run: |
          mkdir -p package
          cp -r alembic.ini  app/  migrations/  requirements.txt  run.py package/
          tar -czf backend.tar.gz -C package .
          tar -tzf backend.tar.gz

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-artifact
          path: backend.tar.gz
          retention-days: 7
